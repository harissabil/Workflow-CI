name: CI - Heart Disease RF Training

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('MLProject/conda.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn "mlflow==2.19.0" matplotlib

      - name: Run MLflow project
        run: mlflow run MLProject/ --no-conda -e main

      - name: Upload mlruns artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-${{ github.run_id }}
          path: mlruns/
          retention-days: 30
          if-no-files-found: warn
